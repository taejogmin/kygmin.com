<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>KYGMIN — CV (잠금)</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#F6F6F4; --ink:#141414; --gray:#DDDDD8;
  --green:#2BB673; --green-deep:#0F6E56;
  --arch:'Archivo','Pretendard',sans-serif;
  --sans:'Pretendard',-apple-system,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;
  --mono:'IBM Plex Mono','SF Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;}
a{color:inherit;text-decoration:none;}
a:focus-visible,button:focus-visible,input:focus-visible{outline:3px solid var(--green);outline-offset:2px;}
.wrap{max-width:760px;margin:0 auto;padding:0 24px;}
nav{border-bottom:3px solid var(--ink);}
.nav-inner{max-width:760px;margin:0 auto;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:var(--arch);font-weight:900;font-size:19px;letter-spacing:-0.5px;}
.logo em{font-style:normal;background:var(--green);color:var(--paper);padding:0 6px;display:inline-block;transform:rotate(-1.5deg);}
.back{font-family:var(--arch);font-size:12px;font-weight:700;text-transform:uppercase;border:2px solid var(--ink);padding:6px 13px;background:#fff;box-shadow:3px 3px 0 var(--ink);}
.back:hover{transform:translate(1px,1px);box-shadow:2px 2px 0 var(--ink);}

/* gate */
#gate{padding:88px 0;}
.gate-box{border:3px solid var(--ink);background:#fff;box-shadow:6px 6px 0 var(--ink);padding:36px 32px;max-width:480px;margin:0 auto;}
.gate-box .lock{font-size:34px;}
.gate-box h1{font-family:var(--arch);font-weight:900;font-size:24px;text-transform:uppercase;letter-spacing:-0.5px;margin:10px 0 6px;}
.gate-box p{font-size:13.5px;color:#3A3A38;margin-bottom:22px;}
.gate-box form{display:flex;gap:10px;flex-wrap:wrap;}
.gate-box input{
  flex:1;min-width:180px;font-family:var(--mono);font-size:14px;
  border:3px solid var(--ink);padding:11px 14px;background:var(--paper);
}
.gate-box button{
  font-family:var(--arch);font-size:13px;font-weight:700;text-transform:uppercase;
  border:3px solid var(--ink);padding:11px 20px;background:var(--green);color:var(--paper);
  cursor:pointer;box-shadow:4px 4px 0 var(--ink);transition:transform .1s, box-shadow .1s;
}
.gate-box button:hover{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink);}
#err{display:none;margin-top:14px;font-family:var(--mono);font-size:12.5px;color:#A32D2D;border:2px solid #A32D2D;background:#FCEBEB;padding:8px 12px;}
#busy{display:none;margin-top:14px;font-family:var(--mono);font-size:12.5px;color:var(--green-deep);}

/* decrypted cv */
#cv{display:none;padding:56px 0 88px;}
.cv-inner{border:3px solid var(--ink);background:#fff;box-shadow:6px 6px 0 var(--ink);padding:36px;}
.cv-head{border-bottom:3px solid var(--ink);padding-bottom:20px;margin-bottom:26px;}
.cv-head h2{font-family:var(--arch);font-weight:900;font-size:28px;text-transform:uppercase;letter-spacing:-1px;}
.cv-role{font-family:var(--mono);font-size:13px;color:var(--green-deep);margin-top:4px;}
.cv-contact{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-family:var(--mono);font-size:12.5px;color:#3A3A38;}
#cv h3{
  font-family:var(--arch);font-weight:900;font-size:16px;text-transform:uppercase;
  box-shadow:inset 0 -10px 0 var(--green);display:inline-block;margin:22px 0 14px;
}
.cv-item{display:grid;grid-template-columns:140px 1fr;gap:16px;margin-bottom:16px;}
.cv-when{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--green-deep);padding-top:3px;}
.cv-what b{font-size:15px;}
.cv-what ul{margin:6px 0 0 18px;font-size:14px;color:#3A3A38;}
.cv-what li{margin-bottom:4px;}
.cv-note{margin-top:26px;padding-top:16px;border-top:2px solid var(--gray);font-family:var(--mono);font-size:11.5px;color:#6B6B67;}
@media(max-width:560px){.cv-item{grid-template-columns:1fr;gap:4px;}.cv-inner{padding:24px;}}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="logo" href="index.html">KYG<em>MIN</em></a>
    <a class="back" href="index.html">&larr; Home</a>
  </div>
</nav>

<div id="gate" class="wrap">
  <div class="gate-box">
    <div class="lock">&#128274;</div>
    <h1>Protected CV</h1>
    <p>이 페이지는 암호로 보호되어 있습니다. 안내받은 접근 암호를 입력해주세요.</p>
    <form id="pwform">
      <input type="password" id="pw" placeholder="access password" autocomplete="off" aria-label="접근 암호" />
      <button type="submit">Unlock</button>
    </form>
    <p id="busy">복호화 중…</p>
    <p id="err">암호가 올바르지 않습니다. 다시 확인해주세요.</p>
  </div>
</div>

<div id="cv" class="wrap"></div>

<script>
const PAYLOAD = "__PAYLOAD__";
const ITER = 310000;

function b64ToBytes(b64){
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt(password){
  const data = b64ToBytes(PAYLOAD);
  const salt = data.slice(0, 16);
  const iv = data.slice(16, 28);
  const ct = data.slice(28);
  const keyMaterial = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: ITER, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
  return new TextDecoder().decode(pt);
}

document.getElementById("pwform").addEventListener("submit", async (e) => {
  e.preventDefault();
  const err = document.getElementById("err");
  const busy = document.getElementById("busy");
  err.style.display = "none";
  busy.style.display = "block";
  try {
    const html = await decrypt(document.getElementById("pw").value);
    document.getElementById("cv").innerHTML = html;
    document.getElementById("gate").style.display = "none";
    document.getElementById("cv").style.display = "block";
  } catch (_) {
    busy.style.display = "none";
    err.style.display = "block";
  }
});
</script>

</body>
</html>
